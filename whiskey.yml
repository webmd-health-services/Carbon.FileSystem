
Build:
- PowerShell: gci 'env:'
  .OnlyBy: BuildServer

- Version:
    .Verbose: true
    .Debug: true
    Path: Carbon.FileSystem\Carbon.FileSystem.psd1
    Prerelease:
    - main: ""
    - bugfix/version-has-prerelease-on-linux: ""
    - "*": rc$(WHISKEY_BUILD_NUMBER)
    IncrementPrereleaseVersion: true

# Update the AppVeyor build/version number.
- Exec: appveyor UpdateBuild -Version "$(WHISKEY_SEMVER2)+$(WHISKEY_BUILD_NUMBER)"
  .OnlyBy: BuildServer

- PowerShell: .\init.ps1
  .ExceptDuring: Clean

- PowerShell: prism install | Format-Table
  .ExceptDuring: Clean
  .WorkingDirectory: Carbon.FileSystem

# Dot-sourcing files is expensive. Move all functions into .psm1 file to improve import speed. Do this before testing
# to ensure the module still works.
- MergeFile:
    .OnlyBy: BuildServer
    # Builds run twice on some servers. Only run this step if the module hasn't been merged yet.
    .IfExists: Carbon.FileSystem\Functions\*.ps1
    Path:
    - Carbon.FileSystem\Functions\*.ps1
    DestinationPath: Carbon.FileSystem\Carbon.FileSystem.psm1
    DeleteSourceFiles: true
    TextSeparator: "$(NewLine)$(NewLine)"

- PowerShell: .\reset.ps1
  .OnlyDuring: Clean

# Build runs twice on some servers, so delete any ZIP file created by another build.
- Delete:
    Path: $(WHISKEY_OUTPUT_DIRECTORY)\*.zip

- CopyFile:
    Path:
    - CHANGELOG.md
    - README.md
    - LICENSE
    - NOTICE
    DestinationDirectory: Carbon.FileSystem

- Zip:
    ArchivePath: $(WHISKEY_OUTPUT_DIRECTORY)\Carbon.FileSystem-$(WHISKEY_SEMVER2).zip
    Path:
    - Carbon.FileSystem
    Exclude:
    - "*.pdb"
    - "*.orig"

- Exec: appveyor PushArtifact '$(WHISKEY_OUTPUT_DIRECTORY)/Carbon.FileSystem-$(WHISKEY_SEMVER2).zip' -DeploymentName 'GitHub'
  .OnlyBy: BuildServer

- PublishPowerShellModule:
    Path: Carbon.FileSystem

- Exec: appveyor PushArtifact '$(WHISKEY_OUTPUT_DIRECTORY)/Carbon.FileSystem.$(WHISKEY_SEMVER2_NO_BUILD_METADATA).nupkg' -DeploymentName 'PowerShellGallery'
  .OnlyBy: BuildServer

- Pester:
    Configuration:
        Run:
            Path: Tests\*.Tests.ps1
            Exit: true
            Throw: true
        TestResult:
            Enabled: true
            OutputPath: .output\pester.xml
            TestSuiteName: Carbon.FileSystem
        Output:
            Verbosity: Detailed